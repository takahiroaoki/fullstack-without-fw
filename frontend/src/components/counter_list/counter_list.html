{{ define "counter_list" }}
<div class="counter-list" data-ref="{{ .Ref }}">
    {{ $refPrefix := .Ref }}
    {{ range .Data.Counters }}
    {{ $ref := printf "%s__%s" $refPrefix "counter" }}
    <div class="counter-list__item">
        {{ template "counter" dict "Ref" $ref "Data" . }}
    </div>
    {{ end }}
    <div class="counter-list__total">Total Count: <span class="counter-list__total__value"></span></div>
</div>
{{ end }}
