{{ define "counter_list" }}
    <div class="counter-list" data-ref="{{ .Ref }}">
        {{ range .Counters }}
            <div class="counter-list__item">
            	{{ template "counter" . }}
            </div>
        {{ end }}
        <div class="counter-list__total">
        	Total Count: <span class="counter-list__total__value"></span>
        </div>
    </div>
{{ end }}
